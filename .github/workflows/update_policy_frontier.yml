name: Update Econ Policy Frontier Data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 18 * * 1"

permissions:
  contents: write

concurrency:
  group: update-econ-policy-frontier
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run updater
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          KIMI_MODEL: moonshot-v1-8k
          MAX_POLICY_FRONTIER_PAPERS_PER_SOURCE: "12"
          MAX_NBER_RECENT_PAPERS: "220"
        run: |
          python scripts/update_policy_frontier.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/policy_frontier.json; then
            echo "No data change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/policy_frontier.json
          git commit -m "chore: update econ policy frontier data"
          git push

